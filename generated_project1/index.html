<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="calculator-app">
        <!-- Theme Toggle UI -->
        <button id="theme-toggle" aria-label="Toggle Theme">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        </button>

        <!-- Display Screen Structure -->
        <div id="display-container">
            <div id="previous-operand" data-previous-operand></div>
            <div id="current-operand" data-current-operand>0</div>
        </div>

        <!-- History Toggle Button -->
        <button id="history-toggle-btn" aria-label="Toggle History">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v5h5"/><path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"/><path d="M12 7v5l4 2"/></svg>
        </button>

        <!-- History Sidebar -->
        <div id="history-panel">
            <ul id="history-list">
                <!-- History items will be injected here by JavaScript -->
            </ul>
        </div>

        <!-- Keypad Container -->
        <div class="keypad buttons-grid">
            <button class="btn" data-action="clear">AC</button>
            <button class="btn" data-action="delete">DEL</button>
            <button class="btn" data-operation="divide">/</button>
            <button class="btn" data-operation="multiply">*</button>

            <button class="btn">7</button>
            <button class="btn">8</button>
            <button class="btn">9</button>
            <button class="btn" data-operation="subtract">-</button>

            <button class="btn">4</button>
            <button class="btn">5</button>
            <button class="btn">6</button>
            <button class="btn" data-operation="add">+</button>

            <button class="btn">1</button>
            <button class="btn">2</button>
            <button class="btn">3</button>
            <button class="btn" data-action="equals">=</button>

            <button class="btn span">0</button>
            <button class="btn">.</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
